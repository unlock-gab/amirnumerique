services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.amir-app.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.amir-app.entrypoints=websecure"
      - "traefik.http.routers.amir-app.tls=true"
      - "traefik.http.services.amir-app.loadbalancer.server.port=3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://amir:${DB_PASSWORD}@db:5432/amir_numerique
      SESSION_SECRET: ${SESSION_SECRET}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dokploy-network
      - amir-internal

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: amir_numerique
      POSTGRES_USER: amir
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amir -d amir_numerique"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - amir-internal

volumes:
  postgres_data:
  uploads:

networks:
  dokploy-network:
    external: true
  amir-internal:
    driver: bridge
